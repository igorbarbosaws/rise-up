<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Agências - Banco do Brasil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-grid">
            <button class="menu-toggle" aria-label="Abrir menu">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="logo-area">
                <img src="assets/img/bb-logo.png" alt="Logo Banco do Brasil" class="logo-img">
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="#" class="active">Agências</a></li>
                    <li><a href="#">Serviços</a></li>
                    <li><a href="#">Produtos</a></li>
                    <li><a href="#">Atendimento</a></li>
                </ul>
            </nav>

            <div class="text-area">
                <h1>Localizador</h1>
                <p>Encontre a sua agência</p>
            </div>

            <div class="right-actions">
                <button class="account-btn">ACESSE SUA CONTA <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Digite a cidade ou estado...">
                <button id="searchBtn">Buscar</button>
            </div>
            <div class="filters">
                <select id="filterState">
                    <option value="">Todos os Estados</option>
                </select>
            </div>
        </section>

        <section id="map-container">
            <div id="map"></div>
        </section>

        <section id="results-list">
            <h2>Resultados encontrados:</h2>
            <div id="agencias-grid" class="grid">
                <p class="placeholder-text">Use a busca para listar as agências.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Localizador de Agências. Desenvolvido para fins de consulta.</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
